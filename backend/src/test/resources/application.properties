spring.application.name=backend-test

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.url=jdbc:postgresql://localhost:5432/muse_test
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.hikari.maximum-pool-size=5

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=

solapi.api.key=dummy
solapi.api.secret=dummy
solapi.sender.phone-number=01012341234

jwt.secret=01234567890123456789012345678901
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000

app.seed.all-user-import-enabled=false
app.seed.session-type-repair-enabled=false
