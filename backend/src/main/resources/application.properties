spring.application.name=backend
# jpa
spring.jpa.hibernate.ddl-auto=create
# Timezone / Jackson
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false
# jpa
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# --- DB ---
spring.datasource.url=jdbc:postgresql://localhost:5432/muse_local
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
# secret
spring.config.import=optional:classpath:application-secret.properties
# solapi
solapi.api.key=${SOLAPI_API_KEY}
solapi.api.secret=${SOLAPI_API_SECRET}
solapi.sender.phone-number=${SOLAPI_SENDER_PHONE_NUMBER}
# jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=3600000
# seed import (local/ops path injection)
app.seed.all-user-import-enabled=${MUSE_ALL_USER_IMPORT_ENABLED:true}
app.seed.all-user-csv-path=${MUSE_ALL_USER_CSV_PATH:}
