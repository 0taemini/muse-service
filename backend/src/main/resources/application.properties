spring.application.name=backend
# jpa
spring.jpa.hibernate.ddl-auto=update
# Timezone / Jackson
spring.jackson.time-zone=Asia/Seoul
spring.jackson.serialization.write-dates-as-timestamps=false
# jpa
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# --- DB ---
spring.datasource.url=jdbc:postgresql://localhost:5432/muse_local
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
# secret
spring.config.import=optional:classpath:application-secret.properties
# solapi
solapi.api.key=${SOLAPI_API_KEY}
solapi.api.secret=${SOLAPI_API_SECRET}
solapi.sender.phone-number=${SOLAPI_SENDER_PHONE_NUMBER}
# jwt
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration-ms=3600000
jwt.refresh-token-expiration-ms=1209600000
# seed import (local/ops path injection)
app.seed.all-user-import-enabled=${MUSE_ALL_USER_IMPORT_ENABLED:true}
app.seed.all-user-csv-path=${MUSE_ALL_USER_CSV_PATH:}
app.seed.session-type-repair-enabled=${MUSE_SESSION_TYPE_REPAIR_ENABLED:true}
app.auth.cookie.secure=${MUSE_AUTH_COOKIE_SECURE:}
app.auth.cookie.same-site=${MUSE_AUTH_COOKIE_SAME_SITE:Lax}
app.auth.cookie.domain=${MUSE_AUTH_COOKIE_DOMAIN:}
# image storage
muse.image.storage.bucket=${MUSE_IMAGE_S3_BUCKET:}
muse.image.storage.region=${MUSE_IMAGE_S3_REGION:ap-northeast-2}
muse.image.storage.cloudfront-domain=${MUSE_IMAGE_CLOUDFRONT_DOMAIN:}
muse.image.storage.presigned-put-expiration-minutes=${MUSE_IMAGE_PRESIGNED_PUT_EXPIRATION_MINUTES:10}
muse.image.storage.lambda-callback-token=${MUSE_IMAGE_LAMBDA_CALLBACK_TOKEN:}
muse.image.storage.access-key-id=${MUSE_IMAGE_AWS_ACCESS_KEY_ID:}
muse.image.storage.secret-access-key=${MUSE_IMAGE_AWS_SECRET_ACCESS_KEY:}
muse.image.storage.max-upload-size-bytes=${MUSE_IMAGE_MAX_UPLOAD_SIZE_BYTES:20971520}
logging.level.root=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId:-no-request} userId=%X{userId:-anonymous} role=%X{role:-anonymous}] %logger{36} - %msg%n
