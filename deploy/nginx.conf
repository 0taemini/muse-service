map $request_method $blocked_method {
    default 1;
    GET 0;
    HEAD 0;
    POST 0;
    PUT 0;
    PATCH 0;
    DELETE 0;
    OPTIONS 0;
}

map $http_user_agent $blocked_user_agent {
    default 0;
    ~*CensysInspect 1;
    ~*zgrab 1;
    ~*masscan 1;
    ~*sqlmap 1;
    ~*nikto 1;
    ~*nmap 1;
}

map $uri $blocked_scan_path {
    default 0;
    ~*^/wp- 1;
    ~*^/wordpress 1;
    ~*^/wp-admin 1;
    ~*^/wp-login\.php$ 1;
    ~*^/xmlrpc\.php$ 1;
    ~*\.php($|/) 1;
    ~*\.(bak|backup|old|orig|save|swp|sql|zip|tar|gz|7z|rar)$ 1;
    ~*^/\.env 1;
    ~*^/\.git 1;
    ~*^/composer\.(json|lock)$ 1;
    ~*^/package-lock\.json$ 1;
    ~*^/yarn\.lock$ 1;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80 default_server;
    server_name _;

    return 444;
}

server {
    listen 80;
    server_name museband.kr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    if ($blocked_method) {
        return 444;
    }

    if ($blocked_user_agent) {
        return 444;
    }

    if ($blocked_scan_path) {
        return 444;
    }

    location ~ /\.(?!well-known/acme-challenge/).+ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name museband.kr;

    ssl_certificate /etc/letsencrypt/live/museband.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/museband.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Resolve Docker service names dynamically so backend/frontend container IP changes
    # do not require recreating the nginx container after every deployment.
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream backend:8080;
    set $frontend_upstream frontend:80;

    if ($host != "museband.kr") {
        return 444;
    }

    if ($blocked_method) {
        return 444;
    }

    if ($blocked_user_agent) {
        return 444;
    }

    if ($blocked_scan_path) {
        return 444;
    }

    location ~ /\.(?!well-known/acme-challenge/).+ {
        access_log off;
        log_not_found off;
        return 404;
    }

    location /api/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /ws {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /ws/ {
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location / {
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
