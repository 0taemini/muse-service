services:
  postgres:
    image: postgres:16
    container_name: muse-postgres
    restart: unless-stopped
    networks:
      - muse-network
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: muse-redis
    restart: unless-stopped
    networks:
      - muse-network
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${BACKEND_IMAGE}
    container_name: muse-backend
    restart: unless-stopped
    networks:
      - muse-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SOLAPI_API_KEY: ${SOLAPI_API_KEY}
      SOLAPI_API_SECRET: ${SOLAPI_API_SECRET}
      SOLAPI_SENDER_PHONE_NUMBER: ${SOLAPI_SENDER_PHONE_NUMBER}
      MUSE_ALL_USER_IMPORT_ENABLED: ${MUSE_ALL_USER_IMPORT_ENABLED:-false}
      MUSE_ALL_USER_CSV_PATH: ${MUSE_ALL_USER_CSV_PATH:-}
    volumes:
      - ./data:/app/data:ro
    expose:
      - "8080"

  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: muse-frontend
    restart: unless-stopped
    networks:
      - muse-network
    depends_on:
      - backend
    expose:
      - "80"

  certbot:
    image: certbot/certbot:latest
    container_name: muse-certbot
    profiles:
      - ops
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

  nginx:
    image: nginx:1.27-alpine
    container_name: muse-nginx
    restart: unless-stopped
    networks:
      - muse-network
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"

networks:
  muse-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
